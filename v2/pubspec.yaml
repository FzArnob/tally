name: tally
description: "Tally — inventory (product-wise cash flow) and customer balance tracking."
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Formatting / i18n. Kept loose so it matches the exact intl version the
  # installed Flutter's flutter_localizations pins (0.19.x / 0.20.x), avoiding
  # a version-solve conflict.
  intl: any

  # Local persistence (chosen locale)
  shared_preferences: ^2.2.3

  # Media
  image_picker: ^1.1.2

  # Vector logo
  flutter_svg: ^2.0.10+1

  # Safe math expression evaluation (replaces JS eval)
  math_expressions: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Localization is generated by the flutter tool (gen-l10n) — no build_runner needed.
  generate: true

  assets:
    - assets/images/
